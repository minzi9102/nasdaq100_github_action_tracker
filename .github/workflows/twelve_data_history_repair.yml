name: Twelve Data History Repair

on:
  workflow_dispatch:
  schedule:
    - cron: "40 08 * * 1-5"

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.11"

jobs:
  history-repair:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: |
          uv venv .venv
          uv pip install -r requirements.txt
      - name: Repair price history
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
        run: .venv/bin/python scripts/repair_twelve_data_history.py --as-of auto
      - name: Commit cache updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          push_with_rebase_retry() {
            for attempt in 1 2 3; do
              if git push origin HEAD:main; then
                return 0
              fi
              if [ "${attempt}" -eq 3 ]; then
                break
              fi
              echo "Push failed on attempt ${attempt}; rebasing on origin/main before retry."
              git pull --rebase origin main
            done
            echo "Push failed after 3 attempts."
            return 1
          }
          git add -f data/cache/prices
          git add data/raw data/processed reports/latest state/latest_twelve_data_history_repair_manifest.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update Twelve Data history repair"
            push_with_rebase_retry
          fi
