name: Nasdaq-100 QQQ Daily Tracker

on:
  workflow_dispatch:
  schedule:
    # GitHub cron uses UTC. 10:30 UTC runs after the prior U.S. market close data window.
    - cron: "30 10 * * 2-6"

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.11"

jobs:
  daily-run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: |
          uv venv .venv
          uv pip install -r requirements.txt

      - name: Run daily tracker
        env:
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          TIINGO_API_TOKEN: ${{ secrets.TIINGO_API_TOKEN }}
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
        run: |
          .venv/bin/python scripts/run_daily.py --as-of auto

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: nasdaq100-qqq-daily-report
          path: |
            reports/latest/
            data/processed/
            data/cache/prices/
            data/cache/quotes/
            state/latest_manifest.json
          retention-days: 30

      - name: Commit generated outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f data/cache/prices data/cache/quotes
          git add reports/latest reports/archive data/raw data/processed state/latest_manifest.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update daily Nasdaq-100 QQQ tracker outputs"
            git push
          fi

      - name: Prepare email notification
        if: always()
        run: |
          {
            echo "Workflow: $GITHUB_WORKFLOW"
            echo "Status: ${{ job.status }}"
            echo "Repository: $GITHUB_REPOSITORY"
            echo "Branch: $GITHUB_REF_NAME"
            echo "Commit: $GITHUB_SHA"
            echo "Run URL: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          } > mail_body.txt

          if [ -f reports/latest/nasdaq100_qqq_daily_tracker.xlsx ]; then
            echo "MAIL_ATTACHMENTS=reports/latest/nasdaq100_qqq_daily_tracker.xlsx" >> "$GITHUB_ENV"
          else
            echo "MAIL_ATTACHMENTS=" >> "$GITHUB_ENV"
            {
              echo ""
              echo "Attachment: reports/latest/nasdaq100_qqq_daily_tracker.xlsx was not generated."
            } >> mail_body.txt
          fi

      - name: Send email notification
        if: always()
        uses: dawidd6/action-send-mail@v17
        with:
          server_address: smtp.qq.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "[${{ job.status }}] Nasdaq-100 QQQ Daily Tracker #${{ github.run_number }}"
          to: 997415931@qq.com
          from: "Nasdaq-100 QQQ Tracker <${{ secrets.MAIL_USERNAME }}>"
          body: file://mail_body.txt
          attachments: ${{ env.MAIL_ATTACHMENTS }}
