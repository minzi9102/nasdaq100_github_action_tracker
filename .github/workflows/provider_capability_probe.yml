name: Provider Capability Probe

on:
  workflow_dispatch:
  schedule:
    - cron: "15 09 * * *"

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.11"

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: |
          uv venv .venv
          uv pip install -r requirements.txt
      - name: Probe providers
        env:
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
        run: .venv/bin/python scripts/probe_provider_capabilities.py --as-of auto
      - name: Commit probe report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/processed reports/latest/provider_capability_probe.csv state/latest_provider_capability_probe_manifest.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update provider capability probe"
            git push
          fi
